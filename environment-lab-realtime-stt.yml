name: lab-realtime-stt
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - ffmpeg
  - portaudio
  - libsndfile
  - numpy
  - scipy
  - scikit-learn
  - pytest
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.8.0+cu128
      - torchaudio==2.8.0+cu128
      - "RealtimeSTT[faster-whisper]==1.0.2"
      - fastapi>=0.111
      - "uvicorn[standard]>=0.30"
      - python-multipart>=0.0.9
      - pyannote.audio>=4.0.0
      - huggingface_hub>=0.24
      - websockets>=12
      - omegaconf>=2.3
